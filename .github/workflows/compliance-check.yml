name: Compliance Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Lint with ruff
      run: ruff check ai_act_audit/
    
    - name: Format check with black
      run: black --check ai_act_audit/
    
    - name: Type check with mypy
      run: mypy ai_act_audit/
    
    - name: Test with pytest
      run: pytest --cov=ai_act_audit --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  classification-validation:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run classification tests
      run: pytest tests/test_classification_cases.py -v
    
    - name: Validate AI Act logic
      run: |
        python -c "
        from ai_act_audit.risk_classifier.classifier import RiskClassifier, AISystem
        classifier = RiskClassifier()
        
        # Test cas haut risque
        high_risk = AISystem(
            name='Test',
            description='Test',
            domain='Test',
            is_employment_related=True
        )
        result = classifier.classify(high_risk)
        assert result.risk_level.value == 'high_risk', 'High risk detection failed'
        
        # Test cas minimal
        minimal = AISystem(
            name='Test',
            description='Test',
            domain='Test'
        )
        result = classifier.classify(minimal)
        assert result.risk_level.value == 'minimal_risk', 'Minimal risk detection failed'
        
        print('✅ Classification logic validated')
        "
